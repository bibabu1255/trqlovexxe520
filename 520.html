<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>520专属浪漫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fecfef 100%);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .swiper-box {
            width: 85vw;
            max-width: 400px;
            height: 60vh;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(255,77,109,0.4);
        }

        .swiper-list {
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.6s ease;
        }

        .swiper-item {
            min-width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .swiper-item img {
            width: 100%;
            height: 75%;
            object-fit: cover;
            border-radius: 15px;
        }

        .img-text {
            margin-top: 12px;
            font-size: 16px;
            color: #fff;
            text-align: center;
            line-height: 1.6;
            text-shadow: 0 0 6px rgba(0,0,0,0.2);
        }

        .dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
        }

        .dot.active {
            background: #ff4d6d;
        }

        .heart {
            width: 80px;
            height: 80px;
            background: #ff4d6d;
            position: relative;
            transform: rotate(-45deg);
            animation: beat 1.2s infinite alternate;
            box-shadow: 0 0 20px #ff4d6d;
            margin: 20px 0;
        }

        .heart::before,
        .heart::after {
            content: '';
            width: 80px;
            height: 80px;
            background: #ff4d6d;
            border-radius: 50%;
            position: absolute;
        }

        .heart::before { top: -40px; left: 0; }
        .heart::after { left: 40px; top: 0; }

        @keyframes beat {
            0% { transform: rotate(-45deg) scale(0.9); }
            100% { transform: rotate(-45deg) scale(1.1); }
        }

        .float-heart {
            position: absolute;
            pointer-events: none;
            animation: floatUp 4s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .bottom-tip{
            color:#fff;
            margin-top:15px;
            font-size:14px;
        }
    </style>
</head>
<body>
    <div class="heart"></div>

    <div class="swiper-box">
        <div class="swiper-list">
            <!-- 1 -->
            <div class="swiper-item">
                <img src="1.jpg" alt="合照1">
                <p class="img-text">初见你的时候，就已经满心欢喜<br>怒吃小蛋糕</p>
            </div>
            <!-- 2 -->
            <div class="swiper-item">
                <img src="3.jpg" alt="合照2">
                <p class="img-text">和你在一起的每一天都格外温柔</p>
            </div>
            <!-- 3 -->
            <div class="swiper-item">
                <img src="2.jpg" alt="合照3">
                <p class="img-text">520只想对你说，满心皆是你</p>
            </div>
            <!-- 4 -->
            <div class="swiper-item">
                <img src="4.jpg" alt="合照4">
                <p class="img-text">笨蛋宝宝在集市看精美饰品，还凶我（哭哭）</p>
            </div>
            <!-- 5 -->
            <div class="swiper-item">
                <img src="7.jpg" alt="合照7">
                <p class="img-text">笨蛋宝宝在风中凌乱的样子，哈哈哈，就放宝宝丑照，咯咯咯</p>
            </div>
        </div>

        <!-- 底部圆点：5张图 → 5个点（已修复） -->
        <div class="dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>

    <p class="bottom-tip">520快乐，我的偏爱与例外</p>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'float-heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 18 + 12 + 'px';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 400);

        const swiperList = document.querySelector('.swiper-list');
        const dots = document.querySelectorAll('.dot');
        let index = 0;
        const imgNum = dots.length;
        setInterval(autoSwiper, 3500);

        function autoSwiper() {
            index++;
            if(index >= imgNum) index = 0;
            swiperList.style.transform = `translateX(-${index * 100}%)`;
            changeDot();
        }

        function changeDot(){
            dots.forEach((item,i)=>{
                item.classList.toggle('active',i===index)
            })
        }
    </script>
</body>
</html>
